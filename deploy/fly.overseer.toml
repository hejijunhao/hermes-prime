app = "hermes-prime-overseer"
primary_region = "sjc"

[build]
  dockerfile = "deploy/Dockerfile.overseer"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "overseer_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"
